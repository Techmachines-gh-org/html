<!DOCTYPE html>
<html>
    <title>Website</title>
    <link rel="stylesheet" href="../styles.css"/>
    <head>
        <div class="topbar">
            <img class="logo" src="../assets/logo.png" height="80" width="80" alt="Website logo">
            <h1>Account</h1>
                <div class="othertext">
                    <p>Sign In</p>
                    <p>Create an Account</p>
                </div>
            </div>
        </div>
    </head>
    <body>
        <div class="loginform">
                <h1>Sign In your account</h1>
                <p>Sign in your account to get access to personalized services to you!</p>
                <p>Email</p>
                <input type="text" class="logininput" placeholder="required*">
                <p>Password</p>
                <input type="password" class="logininput" placeholder="required*">
                <button class="button" style="width: 150px; height: 50px;" >Login</button>
                <p>Don't have an account? <span class="accountcreation">Create an account!</span></p>
        </div>
        <div class="accountcreationform">
                <h1>Create Account</h1>
                <p>Full name</p>
                <input type="text" class="logininput" placeholder="required*">
                <p>Email</p>
                <input type="text" class="logininput" placeholder="required*">
                <p>Password</p>
                <input type="password" class="logininput" placeholder="required*">
                <button class="button" style="width: 150px; height: 50px;">Create Account</button>
                <p>Already have an account? <span class="accountcreation">Login!</span></p>
        </div>
    </body>
</html>
