<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Install App</title>

<link rel="stylesheet" href="../styles.css">

</head>

<body>

<div class="topbar">

    <img
        class="logo"
        src="../assets/logo.png"
        width="80"
        height="80"
        alt="Logo"
    >

    <h1>

        Install App

    </h1>

    <div class="othertext">

        <a
            class="link"
            href="#"
            id="termsofservice"
        >
            Terms of Service
        </a>

        <a
            class="link"
            href="#"
            id="privacypolicy"
        >
            Privacy Policy
        </a>

    </div>

</div>



<div id="authmessage"></div>



<div class="oauthcard">

    <img
        id="applogo"
        class="oauthlogo"
        src="../assets/app-placeholder.png"
        alt="Application Logo"
    >

    <h1>

        Install
        <span id="appname">

            Loading...

        </span>

        in your account?

    </h1>

    <p>

        <strong id="developer">

            Loading...

        </strong>

        would like permission to access your Techmachines account.

    </p>

    <hr>

    <h2>

        Permissions requested

    </h2>

    <p>

        Select which permissions you want to grant.

    </p>

    <div id="permissionlist">

        <!-- Filled by script.js -->

    </div>

    <hr>

    <div class="oauthbuttons">

        <button
            class="button secondarybutton"
            id="cancelinstall"
            style="width:180px;height:50px;"
        >

            Do Not Install

        </button>

        <button
            class="button"
            id="installapp"
            style="width:180px;height:50px;"
        >

            Install

        </button>

    </div>

</div>



<script src="../script.js"></script>

</body>

</html>
